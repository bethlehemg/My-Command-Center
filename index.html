<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2EE;--surface:#FFF;--surface2:#F0EDE8;--surface3:#E8E4DF;
  --text:#1A1714;--text2:#6B6560;--text3:#A09A94;
  --border:#E2DDD8;--border2:#CEC8C2;
  --rad:12px;--radm:8px;--rads:6px;
  --red:#C03030;--red-bg:#FCEBEB;--red-tc:#791F1F;
  --amber:#C07018;--amber-bg:#FAEEDA;--amber-tc:#633806;
  --green-bg:#EAF3DE;--green-tc:#27500A;
  --blue-bg:#EBF2FC;--blue-tc:#0C447C;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text)}
.app{display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.topbar-date{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;gap:5px;cursor:pointer;background:var(--surface);white-space:nowrap}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#2A9A70;flex-shrink:0}
.sync-dot.syncing{background:#C07018;animation:blink 1s infinite}
.sync-dot.error{background:#C03030}
.undo-bar{display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1A1714;color:#fff;padding:10px 16px;border-radius:30px;font-size:12px;display:flex;align-items:center;gap:12px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.undo-bar.show{display:flex}
.undo-btn{background:none;border:none;color:#EF9F27;font-size:12px;cursor:pointer;font-weight:600;padding:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* CONTENT */
.content{flex:1;padding:14px;max-width:700px;margin:0 auto;width:100%;padding-bottom:90px}

/* BOTTOM NAV */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 12px;cursor:pointer;color:var(--text3);font-size:9px;gap:3px;border:none;background:none;font-family:inherit;transition:color .15s;position:relative}
.bn-item.active{color:var(--text)}
.bn-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}

/* CARDS & COMMON */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:15px;margin-bottom:12px}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-weight:600;margin-bottom:10px}
.page-title{font-size:21px;font-weight:600;letter-spacing:-.4px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:14px}

/* ALERTS */
.alert{border-radius:var(--radm);padding:10px 13px;margin-bottom:8px;border-left:3px solid}
.alert-red{background:var(--red-bg);border-color:var(--red)}
.alert-amber{background:var(--amber-bg);border-color:var(--amber)}
.alert-green{background:var(--green-bg);border-color:#3B6D11}
.alert-blue{background:var(--blue-bg);border-color:#1A5CA8}
.alert-title{font-size:12px;font-weight:600;margin-bottom:2px}
.alert-red .alert-title{color:var(--red-tc)}
.alert-amber .alert-title{color:var(--amber-tc)}
.alert-green .alert-title{color:var(--green-tc)}
.alert-blue .alert-title{color:var(--blue-tc)}
.alert-sub{font-size:12px;color:var(--text2);line-height:1.5}

/* ROLE CARDS */
.role-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:13px;cursor:pointer;margin-bottom:10px;transition:transform .15s;width:100%;text-align:left;font-family:inherit}
.role-card:active{transform:scale(.98)}
.rch{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rch-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rch-name{font-weight:600;font-size:14px;flex:1}
.rch-badge{font-size:10px;padding:2px 8px;border-radius:10px}
.rcs{display:flex;gap:14px;margin-bottom:8px}
.rcs-n{font-size:20px;font-weight:600}
.rcs-l{font-size:10px;color:var(--text3)}
.prog-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.stat-box{background:var(--surface2);border-radius:var(--radm);padding:12px;text-align:center}
.stat-n{font-size:24px;font-weight:600}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}

/* FOCUS */
.focus-block{background:var(--text);border-radius:var(--rad);padding:15px 17px;margin-bottom:15px}
.focus-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-bottom:7px}
.focus-ta{background:transparent;border:none;width:100%;color:#fff;font-size:15px;font-weight:600;line-height:1.4;outline:none;resize:none;font-family:inherit}
.focus-ta::placeholder{color:rgba(255,255,255,.3)}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--text);border-radius:3px;transition:width .4s}
.prog-lbl{font-size:12px;color:var(--text2);white-space:nowrap}

/* TASKS */
.task-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:5px;cursor:pointer;width:100%;text-align:left;font-family:inherit;transition:background .1s}
.task-item:active{background:var(--surface2)}
.task-item.done .task-txt{text-decoration:line-through;color:var(--text3)}
.cb{width:18px;height:18px;border:1px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.cb.checked{background:var(--text);border-color:var(--text)}
.task-txt{flex:1;font-size:13px;line-height:1.5;color:var(--text)}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.task-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0 2px;line-height:1;opacity:0}
.task-item:hover .task-del{opacity:1}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;display:inline-block}

/* ADD ROW */
.add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-row input,.add-row select{font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.add-row input{flex:2;min-width:0}
.add-row select{flex:1;min-width:70px}

/* BUTTONS */
.btn{padding:8px 15px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radm);cursor:pointer;background:transparent;color:var(--text);font-family:inherit;transition:background .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);font-weight:500}
.btn-full{width:100%;padding:11px;font-size:14px}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:20px;border:1px solid var(--border2)}
.btn-sm.active{background:var(--text);color:#fff;border-color:var(--text)}
.btn-icon{padding:4px 9px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rads);cursor:pointer;background:transparent;color:var(--text2);font-family:inherit}
.btn-danger{border-color:#F7C1C1;color:var(--red);background:var(--red-bg)}

/* COMMITS */
.commit-item{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:6px}
.commit-item.done .c-what{text-decoration:line-through;color:var(--text3)}
.c-left{flex:1}
.c-who{font-size:13px;font-weight:600;margin-bottom:2px}
.c-what{font-size:12px;color:var(--text2);line-height:1.5}
.c-meta{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap}
.c-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px;flex-shrink:0;opacity:0}
.commit-item:hover .c-del{opacity:1}
.circle-btn{width:24px;height:24px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;background:transparent;padding:0;transition:all .15s}
.circle-btn.checked{background:var(--text);border-color:var(--text)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:420px){.form-grid{grid-template-columns:1fr}}
.field-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.field-inp{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.field-ta{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none;resize:none;font-family:inherit}

/* GOALS */
.goal-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:5px}
.goal-inp{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit}

/* RECURRING */
.rec-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:5px}
.rec-freq-badge{font-size:10px;padding:2px 7px;border-radius:9px;background:var(--surface2);color:var(--text2);white-space:nowrap;flex-shrink:0}

/* SCORES */
.score-dots{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.sdot{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);cursor:pointer;transition:all .15s;flex-shrink:0;padding:0;background:transparent}

/* TABS */
.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.tab-row::-webkit-scrollbar{display:none}

/* ROLE DETAIL */
.rdh{display:flex;align-items:flex-start;gap:12px}
.rdh-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px}
.rdh-info{flex:1}
.rdh-name{font-size:19px;font-weight:600}
.rdh-sub-text{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5}
.rdh-stats{display:flex;gap:14px;flex-shrink:0}
.rdhs-n{font-size:20px;font-weight:600;text-align:center}
.rdhs-l{font-size:10px;color:var(--text3);text-align:center}

/* MANAGE */
.manage-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border-radius:var(--radm);margin-bottom:6px}
.manage-item-name{flex:1;font-size:13px}
.mi-status{font-size:10px;padding:2px 8px;border-radius:10px}
.status-active{background:var(--green-bg);color:var(--green-tc)}
.status-archived{background:var(--surface3);color:var(--text3)}

/* REMINDER ITEMS */
.reminder-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:7px}
.ri-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.ri-content{flex:1}
.ri-title{font-size:13px;font-weight:600;margin-bottom:2px}
.ri-sub{font-size:12px;color:var(--text2);line-height:1.5}
.ri-tag{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:5px}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-title{font-size:16px;font-weight:600}
.cal-mode-btns{display:flex;gap:6px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.day-header{text-align:center;font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:4px 0}
.day-cell{border:1px solid var(--border);border-radius:var(--rads);padding:6px 4px;min-height:70px;background:var(--surface);cursor:pointer;transition:background .1s}
.day-cell:active{background:var(--surface2)}
.day-cell.today{border-color:var(--text);border-width:2px}
.day-cell.other-month{background:var(--surface2);opacity:.6}
.day-num{font-size:12px;font-weight:600;margin-bottom:4px;text-align:center}
.day-cell.today .day-num{background:var(--text);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.cal-event{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.gcal-event{background:var(--blue-bg);color:var(--blue-tc)}
.outlook-event{background:#EEF0FC;color:#3C3489}
.task-event{background:var(--surface2);color:var(--text2)}
.commit-event{background:var(--amber-bg);color:var(--amber-tc)}
.cal-connect-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:20px;text-align:center;margin-bottom:12px}
.cal-connect-title{font-size:14px;font-weight:600;margin-bottom:6px}
.cal-connect-sub{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.cal-connect-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.cal-btn-gcal{background:#EBF2FC;color:#1A5CA8;border:1px solid #B5D4F4;padding:8px 16px;border-radius:var(--radm);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.cal-btn-outlook{background:#EEF0FC;color:#3C3489;border:1px solid #CECBF6;padding:8px 16px;border-radius:var(--radm);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.event-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px}

/* LOADING / AUTH */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:32px 20px}
.auth-title{font-size:19px;font-weight:600;margin-bottom:8px}
.auth-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:22px;max-width:300px}
.auth-btn{padding:13px 26px;font-size:14px;font-weight:600;background:var(--text);color:#fff;border:none;border-radius:var(--radm);cursor:pointer;font-family:inherit;width:100%;max-width:280px}
.health-nudge{background:var(--red-bg);border-radius:var(--radm);padding:10px 13px;font-size:12px;color:var(--red-tc);line-height:1.5;margin-bottom:12px}
.hz-head{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.hz-pill{font-size:11px;padding:3px 11px;border-radius:12px;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">Command Center</div>
      <div class="topbar-date" id="topDate"></div>
    </div>
    <div class="topbar-right">
      <button class="sync-btn" id="syncStatus" onclick="manualSync()">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">Saved</span>
      </button>
    </div>
  </div>

  <div id="undoBar" class="undo-bar">
    <span id="undoMsg">Deleted</span>
    <button class="undo-btn" onclick="undo()">Undo (Ctrl+Z)</button>
    <button class="undo-btn" onclick="redo()" id="redoBtn" style="color:#9FE1CB">Redo</button>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text2)">Loading your data...</div></div>
  </div>

  <nav class="bottom-nav" id="bottomNav" style="display:none">
    <button class="bn-item active" id="bn-summary" onclick="nav('summary')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </button>
    <button class="bn-item" id="bn-today" onclick="nav('today')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Today
    </button>
    <button class="bn-item" id="bn-reminders" onclick="nav('reminders')">
      <span id="reminderBadge" class="bn-badge" style="display:none">0</span>
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Reminders
    </button>
    <button class="bn-item" id="bn-calendar" onclick="nav('calendar')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
      Calendar
    </button>
    <button class="bn-item" id="bn-roles" onclick="nav('roles')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Roles
    </button>
  </nav>
</div>

// ── UNDO/REDO ─────────────────────────────────────────────────────────────
function snapshot(){return JSON.parse(JSON.stringify(S))}
function pushUndo(before,msg){
  undoStack.push({state:before,msg});
  redoStack=[];
  if(undoStack.length>30)undoStack.shift();
  showUndoBar(msg);
}
function showUndoBar(msg){
  const bar=document.getElementById('undoBar');
  document.getElementById('undoMsg').textContent=msg||'Change made';
  bar.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>bar.classList.remove('show'),4000);
}
function undo(){
  if(!undoStack.length)return;
  const entry=undoStack.pop();
  redoStack.push({state:snapshot(),msg:entry.msg});
  S=entry.state;
  scheduleSave();render();
  showUndoBar('Undone: '+entry.msg);
}
function redo(){
  if(!redoStack.length)return;
  const entry=redoStack.pop();
  undoStack.push({state:snapshot(),msg:entry.msg});
  S=entry.state;
  scheduleSave();render();
  showUndoBar('Redone: '+entry.msg);
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo()}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo()}
});

function setSyncStatus(state,label){
  document.getElementById('syncDot').className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  document.getElementById('syncLabel').textContent=label;
}
async function sheetsRequest(method,path,body){
  const url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+path;
  const opts={method,headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url,opts);
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function loadFromSheets(){
  try{
    const res=await sheetsRequest('GET','/values/Data!A1');
    const rows=res.values;
    if(rows&&rows[0]&&rows[0][0]){
      const loaded=JSON.parse(rows[0][0]);
      S=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),loaded);
      if(!S.subProjects)S.subProjects=DEFAULT.subProjects;
      if(!S.calConnected)S.calConnected={gcal:false,outlook:false};
    }else{await saveToSheets(true)}
  }catch(e){console.warn('Load failed:',e);setSyncStatus('error','Load failed')}
}
async function saveToSheets(silent){
  if(!isAuthenticated)return;
  if(!silent)setSyncStatus('syncing','Saving...');
  try{
    await sheetsRequest('PUT','/values/Data!A1?valueInputOption=RAW',{range:'Data!A1',majorDimension:'ROWS',values:[[JSON.stringify(S)]]});
    setSyncStatus('saved','Saved');
  }catch(e){setSyncStatus('error','Save failed')}
}
function scheduleSave(){clearTimeout(syncTimer);syncTimer=setTimeout(()=>saveToSheets(false),1500)}
function manualSync(){saveToSheets(false)}

async function fetchGCalEvents(){
  if(!accessToken||!S.calConnected.gcal)return[];
  try{
    const start=new Date();start.setDate(start.getDate()-7);
    const end=new Date();end.setDate(end.getDate()+30);
    const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=50`;
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+accessToken}});
    const data=await res.json();
    return (data.items||[]).map(e=>({
      id:e.id,title:e.summary||'(no title)',
      start:e.start.dateTime||e.start.date,
      end:e.end.dateTime||e.end.date,
      source:'gcal',color:'#EBF2FC',tc:'#0C447C'
    }));
  }catch(e){return[]}
}

function chk(c){return '<svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="'+(c||'#fff')+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4l2.5 2.5L9 1"/></svg>'}
function pill(bg,tc,text){return '<span class="pill" style="background:'+bg+';color:'+tc+'">'+esc(text)+'</span>'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getSubName(role,subId){if(!subId)return '';const s=(S.subProjects[role]||[]).find(x=>x.id===subId);return s?s.name:''}
function getActiveSubs(role){return(S.subProjects[role]||[]).filter(s=>!s.archived)}
function subPill(role,subId){if(!subId)return '';const n=getSubName(role,subId);if(!n)return '';const r=ROLES[role];return pill(r.bg,r.tc,n)}
function freqLabel(f,days,date){
  const map={daily:'Daily',weekdays:'Weekdays',weekly:'Weekly',biweekly:'Every 2 weeks',monthly:'Monthly','last-week-month':'Last week of month','custom-days':'Custom days','custom-date':'On day '+date};
  if(f==='custom-days'&&days&&days.length)return DAYS.filter((_,i)=>days.includes(i)).join(', ');
  return map[f]||f;
}
function isDueToday(freq,days,date){
  const d=NOW.getDay(),dom=NOW.getDate();
  if(freq==='daily')return true;
  if(freq==='weekdays')return d>=1&&d<=5;
  if(freq==='weekly')return!days||!days.length||days.includes(d);
  if(freq==='custom-days')return days&&days.includes(d);
  if(freq==='monthly')return dom===1;
  if(freq==='last-week-month'){const lastDay=new Date(NOW.getFullYear(),NOW.getMonth()+1,0).getDate();return dom>=lastDay-6}
  if(freq==='custom-date')return dom===parseInt(date);
  return false;
}

  // Overdue commits (not done, urgent)

  const thisWeek=S.commits.filter(c=>!c.done&&c.urg==='s');

  // Recurring due today

  return items;

  }

function setCalMode(m){UI.calMode=m;render()}
function calNav(dir){
  const d=new Date(UI.calDate);
  if(UI.calMode==='week')d.setDate(d.getDate()+dir*7);
  else d.setMonth(d.getMonth()+dir);
  UI.calDate=d;render();
}
function getEventsForDate(date){
  const ds=date.toISOString().split('T')[0];
  const events=[];
  // Tasks due on this day
  S.tasks.forEach(t=>{if(isDueToday_forDate(t.freq,t.days,t.date,date))events.push({title:t.text,cls:'task-event',role:t.area})});
  // Commitments with dueDate
  S.commits.forEach(c=>{if(c.dueDate===ds&&!c.done)events.push({title:c.what,cls:'commit-event',role:c.role})});
  // GCal events
  gcalEvents.forEach(e=>{
    const es=e.start.split('T')[0];
    if(es===ds)events.push({title:e.title,cls:'gcal-event',role:null});
  });
  return events;
}
function isDueToday_forDate(freq,days,date,d){
  const dow=d.getDay(),dom=d.getDate();
  if(freq==='daily')return true;
  if(freq==='weekdays')return dow>=1&&dow<=5;
  if(freq==='weekly')return!days||!days.length||days.includes(dow);
  if(freq==='custom-days')return days&&days.includes(dow);
  if(freq==='monthly')return dom===1;
  if(freq==='last-week-month'){const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();return dom>=last-6}
  if(freq==='custom-date')return dom===parseInt(date);
  return false;
}
function renderWeekCal(){
  const start=new Date(UI.calDate);
  start.setDate(start.getDate()-start.getDay());
  const end=new Date(start);end.setDate(end.getDate()+6);
  document.getElementById && setTimeout(()=>{const t=document.getElementById('calTitle');if(t)t.textContent=start.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+end.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})},0);
  let h='<div class="week-grid">';
  DAYS.forEach(d=>{h+='<div class="day-header">'+d+'</div>'});
  for(let i=0;i<7;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    const isToday=d.toDateString()===NOW.toDateString();
    const events=getEventsForDate(d);
    h+='<div class="day-cell'+(isToday?' today':'')+'">';
    h+='<div class="day-num">'+d.getDate()+'</div>';
    events.slice(0,3).forEach(e=>{
      const r=e.role?ROLES[e.role]:null;
      const bg=r?r.bg:'var(--surface2)',tc=r?r.tc:'var(--text2)';
      h+='<div class="cal-event" style="background:'+bg+';color:'+tc+'">'+esc(e.title)+'</div>';
    });
    if(events.length>3)h+='<div style="font-size:9px;color:var(--text3)">+'+( events.length-3)+' more</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}
function renderMonthCal(){
  const y=UI.calDate.getFullYear(),m=UI.calDate.getMonth();
  setTimeout(()=>{const t=document.getElementById('calTitle');if(t)t.textContent=MONTHS[m]+' '+y},0);
  const first=new Date(y,m,1);const last=new Date(y,m+1,0);
  let h='<div class="month-grid">';
  DAYS.forEach(d=>{h+='<div class="day-header">'+d+'</div>'});
  for(let i=0;i<first.getDay();i++){h+='<div class="day-cell other-month"></div>'}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d);
    const isToday=date.toDateString()===NOW.toDateString();
    const events=getEventsForDate(date);
    h+='<div class="day-cell'+(isToday?' today':'')+'" style="min-height:55px">';
    h+='<div class="day-num">'+d+'</div>';
    events.slice(0,2).forEach(e=>{
      const r=e.role?ROLES[e.role]:null;
      const bg=r?r.bg:'var(--surface2)',tc=r?r.tc:'var(--text2)';
      h+='<div class="cal-event" style="background:'+bg+';color:'+tc+'">'+esc(e.title)+'</div>';
    });
    if(events.length>2)h+='<div style="font-size:9px;color:var(--text3)">+'+( events.length-2)+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

        h+='<div class="rec-item">'+pill('#F0EDE8','#6B6560',freqLabel(rec.freq,rec.days,rec.date));
        if(rec.sub)h+=subPill(key,rec.sub);
        h+='<span style="flex:1;font-size:13px;margin:0 4px">'+esc(rec.text)+'</span>';
        h+='<button style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px" onclick="deleteRec(\''+key+'\',\''+rec.id+'\')">&#x2715;</button></div>';
      });
    });
    h+='<div class="add-row" style="margin-top:10px"><input type="text" id="recInp" placeholder="Add recurring task..." style="flex:2">';
    h+='<select id="recFreq" style="flex:1">';
    FREQ_OPTIONS.forEach(f=>{h+='<option value="'+f.v+'">'+f.l+'</option>'});
    h+='</select></div>';
    if(activeSubs.length){
      h+='<div class="add-row" style="margin-top:5px"><select id="recSub" style="flex:2"><option value="">No sub-label</option>';
      activeSubs.forEach(s=>{h+='<option value="'+s.id+'">'+esc(s.name)+'</option>'});
      h+='</select>';
    }else{h+='<div class="add-row" style="margin-top:5px">'}
    h+='<button class="btn btn-primary" style="flex:1" onclick="addRec(\''+key+'\')">+ Add</button></div>';
  }

  if(UI.roleTab==='today'){
    const filtered=myTasks.filter(t=>UI.subFilter==='all'||t.sub===UI.subFilter);
    if(!filtered.length)h+='<div style="font-size:13px;color:var(--text3);padding:12px 0">No tasks for this role today.</div>';
    filtered.forEach(t=>{
      h+='<button class="task-item'+(t.done?' done':'')+'" onclick="toggleTask('+t.id+')">';
      h+='<div class="cb'+(t.done?' checked':'')+'">'+(t.done?chk():'')+'</div>';
      h+='<div class="task-txt">'+esc(t.text)+'</div>';
      if(t.sub)h+=subPill(key,t.sub);
      h+='<button class="task-del" onclick="deleteTask(event,'+t.id+')">&#x2715;</button></button>';
    });
  }

  if(UI.roleTab==='add'){
    h+='<div class="card"><div class="form-grid"><div><div class="field-lbl">Type</div><select class="field-inp" id="daType"><option value="commit">Commitment</option><option value="task">Task (today)</option><option value="rec">Recurring task</option></select></div>';
    h+='<div><div class="field-lbl">To whom?</div><input class="field-inp" id="daWho" type="text" placeholder="Name or group"></div></div>';
    h+='<div style="margin-bottom:10px"><div class="field-lbl">Description</div><input class="field-inp" id="daWhat" type="text" placeholder="Be specific..."></div>';
    if(activeSubs.length){
      h+='<div style="margin-bottom:10px"><div class="field-lbl">Project / Client</div><select class="field-inp" id="daSub"><option value="">None</option>';
      activeSubs.forEach(s=>{h+='<option value="'+s.id+'">'+esc(s.name)+'</option>'});
      h+='</select></div>';
    }
    h+='<div class="form-grid"><div><div class="field-lbl">Urgency</div><select class="field-inp" id="daUrg"><option value="u">Urgent</option><option value="s">This week</option><option value="o">This month</option></select></div>';
    h+='<div><div class="field-lbl">Frequency</div><select class="field-inp" id="daFreq"><option value="">One-time</option>';
    FREQ_OPTIONS.forEach(f=>{h+='<option value="'+f.v+'">'+f.l+'</option>'});
    h+='</select></div></div>';
    h+='<button class="btn btn-primary btn-full" style="margin-top:10px" onclick="addFromDetail(\''+key+'\')">Save</button></div>';
  }

  if(UI.roleTab==='manage'){h+=renderManagePanel(key)}
  return h;
}

function renderManagePanel(key){
  const r=ROLES[key];
  const allSubs=S.subProjects[key]||[];
  const label=key==='oaf'?'Project':key==='lm'?'Client':'Label';
  let h='<div class="card"><div class="sec-lbl">Active '+label+'s</div>';
  const active=allSubs.filter(s=>!s.archived);
  if(!active.length)h+='<div style="font-size:13px;color:var(--text3);padding:6px 0">No active '+label.toLowerCase()+'s yet.</div>';
  active.forEach(s=>{
    h+='<div class="manage-item"><div class="manage-item-name">'+esc(s.name)+'</div>';
    h+='<span class="mi-status status-active">Active</span>';
    h+='<button class="btn-icon" onclick="archiveSub(\''+key+'\',\''+s.id+'\')">Archive</button></div>';
  });
  const archived=allSubs.filter(s=>s.archived);
  if(archived.length){
    h+='<div class="sec-lbl" style="margin-top:14px">Archived</div>';
    archived.forEach(s=>{
      h+='<div class="manage-item"><div class="manage-item-name" style="color:var(--text3)">'+esc(s.name)+'</div>';
      h+='<span class="mi-status status-archived">Archived</span>';
      h+='<button class="btn-icon" onclick="restoreSub(\''+key+'\',\''+s.id+'\')">Restore</button></div>';
    });
  }
  h+='<div style="margin-top:14px"><div class="field-lbl">Add new '+label.toLowerCase()+'</div>';
  h+='<div class="add-row"><input type="text" id="newSubInp" placeholder="'+label+' name..." onkeydown="if(event.key===\'Enter\')addSub(\''+key+'\')">';
  h+='<button class="btn btn-primary" onclick="addSub(\''+key+'\')">+ Add</button></div></div></div>';
  return h;
}
function addSub(key){
  const inp=document.getElementById('newSubInp');if(!inp||!inp.value.trim())return;
  const b=snapshot();
  if(!S.subProjects[key])S.subProjects[key]=[];
  S.subProjects[key].push({id:key+'-'+S.nextId++,name:inp.value.trim(),archived:false});
  inp.value='';pushUndo(b,'Added sub-label');scheduleSave();render();
}
function archiveSub(key,id){
  const b=snapshot();const s=(S.subProjects[key]||[]).find(x=>x.id===id);
  if(s){s.archived=true;pushUndo(b,'Archived: '+s.name);scheduleSave();render()}
}
function restoreSub(key,id){
  const b=snapshot();const s=(S.subProjects[key]||[]).find(x=>x.id===id);
  if(s){s.archived=false;pushUndo(b,'Restored: '+s.name);scheduleSave();render()}
}
function bindRoleDetail(){
  const ta=document.getElementById('visionTA');const key=UI.roleView;
  if(ta)ta.addEventListener('input',e=>{S.vision[key]=e.target.value;scheduleSave()});
}
function addFromDetail(key){
  const type=document.getElementById('daType').value;
  const what=document.getElementById('daWhat').value.trim();if(!what)return;
  const who=document.getElementById('daWho')?document.getElementById('daWho').value.trim():'';
  const urg=document.getElementById('daUrg').value;
  const freq=document.getElementById('daFreq').value;
  const subEl=document.getElementById('daSub');const sub=subEl?subEl.value:'';
  const b=snapshot();
  if(type==='commit'){S.commits.push({id:S.nextId++,who:who||'—',what,role:key,sub,urg,freq,dueDate:'',done:false});UI.roleTab='commits'}
  else if(type==='task'){S.tasks.push({id:S.nextId++,text:what,area:key,sub,done:false,freq:freq||'daily',days:[],date:''});UI.roleTab='today'}
  else{if(!S.recurring[key])S.recurring[key]=[];S.recurring[key].push({id:'r'+S.nextId++,text:what,freq:freq||'weekly',days:[],date:'',sub});UI.roleTab='recurring'}
  pushUndo(b,'Added '+type);scheduleSave();render();
}
function deleteRec(key,id){
  const b=snapshot();const rec=(S.recurring[key]||[]).find(r=>r.id===id);
  S.recurring[key]=(S.recurring[key]||[]).filter(r=>r.id!==id);
  pushUndo(b,'Deleted recurring: '+(rec?rec.text:''));scheduleSave();render();
}
function addRec(key){
  const inp=document.getElementById('recInp');const freq=document.getElementById('recFreq').value;
  const subEl=document.getElementById('recSub');const sub=subEl?subEl.value:'';
  if(!inp||!inp.value.trim())return;
  const b=snapshot();
  if(!S.recurring[key])S.recurring[key]=[];
  S.recurring[key].push({id:'r'+S.nextId++,text:inp.value.trim(),freq,days:[],date:'',sub});
  inp.value='';pushUndo(b,'Added recurring task');scheduleSave();render();
}
</script>
