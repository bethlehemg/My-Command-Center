<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Command Center</title>
<style>
/* ─── RESET & ROOT ──────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2EE;--surface:#FFF;--surface2:#F0EDE8;--surface3:#E8E4DF;
  --text:#1A1714;--text2:#6B6560;--text3:#A09A94;
  --border:#E2DDD8;--border2:#CEC8C2;
  --rad:12px;--radm:8px;--rads:6px;
  --red:#C03030;--red-bg:#FCEBEB;--red-tc:#791F1F;
  --amber:#C07018;--amber-bg:#FAEEDA;--amber-tc:#633806;
  --green-bg:#EAF3DE;--green-tc:#27500A;
  --blue-bg:#EBF2FC;--blue-tc:#0C447C;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text)}
button,input,select,textarea{font-family:inherit}
input,select,textarea{-webkit-appearance:none;appearance:none}

/* ─── LAYOUT ────────────────────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;min-height:100vh}
.content{flex:1;padding:14px;max-width:700px;margin:0 auto;width:100%;padding-bottom:90px}

/* ─── TOPBAR ─────────────────────────────────────────────────────────────── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:8px}
.topbar-left{flex:1;min-width:0}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.topbar-date{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Search bar in topbar */
.search-wrap{position:relative;flex:1;max-width:200px}
.search-inp{width:100%;font-size:12px;padding:6px 10px 6px 28px;border:1px solid var(--border2);border-radius:20px;background:var(--surface2);color:var(--text);outline:none;transition:all .2s}
.search-inp:focus{background:var(--surface);border-color:var(--text);box-shadow:0 0 0 3px rgba(26,23,20,.08)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;display:none;padding:0;line-height:1}

.sync-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;gap:5px;cursor:pointer;background:var(--surface);white-space:nowrap}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#2A9A70;flex-shrink:0}
.sync-dot.syncing{background:#C07018;animation:blink 1s infinite}
.sync-dot.error{background:#C03030}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── UNDO BAR ──────────────────────────────────────────────────────────── */
.undo-bar{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1A1714;color:#fff;padding:10px 16px;border-radius:30px;font-size:12px;display:none;align-items:center;gap:12px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap}
.undo-bar.show{display:flex}
.undo-btn{background:none;border:none;color:#EF9F27;font-size:12px;cursor:pointer;font-weight:600;padding:0}

/* ─── DELETE CONFIRM MODAL ──────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--rad);padding:20px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;font-size:13px;border-radius:var(--radm);cursor:pointer;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text)}
.modal-btns .btn-confirm-del{background:var(--red);color:#fff;border-color:var(--red)}

/* ─── BOTTOM NAV ────────────────────────────────────────────────────────── */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 12px;cursor:pointer;color:var(--text3);font-size:9px;gap:3px;border:none;background:none;font-family:inherit;transition:color .15s;position:relative}
.bn-item.active{color:var(--text)}
.bn-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;font-weight:600}
.bn-badge.show{display:flex}

/* ─── COMMON CARDS ──────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-weight:600;margin-bottom:10px}
.page-title{font-size:21px;font-weight:600;letter-spacing:-.4px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:14px}
.empty-state{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px;line-height:1.6}
.empty-state-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.empty-state-action{margin-top:12px;font-size:12px;color:var(--text2)}

/* ─── ALERTS ────────────────────────────────────────────────────────────── */
.alert{border-radius:var(--radm);padding:10px 13px;margin-bottom:8px;border-left:3px solid}
.alert-red{background:var(--red-bg);border-color:var(--red)}
.alert-amber{background:var(--amber-bg);border-color:var(--amber)}
.alert-green{background:var(--green-bg);border-color:#3B6D11}
.alert-blue{background:var(--blue-bg);border-color:#1A5CA8}
.alert-title{font-size:12px;font-weight:600;margin-bottom:2px}
.alert-red .alert-title{color:var(--red-tc)}
.alert-amber .alert-title{color:var(--amber-tc)}
.alert-green .alert-title{color:var(--green-tc)}
.alert-blue .alert-title{color:var(--blue-tc)}
.alert-sub{font-size:12px;color:var(--text2);line-height:1.5}

/* ─── ROLE CARDS (summary) ──────────────────────────────────────────────── */
.role-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:13px;cursor:pointer;margin-bottom:10px;transition:transform .15s,box-shadow .15s;width:100%;text-align:left;font-family:inherit;box-shadow:var(--shadow)}
.role-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1)}
.role-card:active{transform:scale(.98)}
.rch{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rch-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rch-name{font-weight:600;font-size:14px;flex:1}
.rch-badge{font-size:10px;padding:2px 8px;border-radius:10px}
.rcs{display:flex;gap:14px;margin-bottom:8px}
.rcs-n{font-size:20px;font-weight:600}
.rcs-l{font-size:10px;color:var(--text3)}
.prog-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s ease}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.stat-box{background:var(--surface2);border-radius:var(--radm);padding:12px;text-align:center}
.stat-n{font-size:24px;font-weight:600}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}

/* ─── FOCUS BLOCK ───────────────────────────────────────────────────────── */
.focus-block{background:var(--text);border-radius:var(--rad);padding:15px 17px;margin-bottom:15px}
.focus-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-bottom:7px}
.focus-ta{background:transparent;border:none;width:100%;color:#fff;font-size:15px;font-weight:600;line-height:1.4;outline:none;resize:none;font-family:inherit}
.focus-ta::placeholder{color:rgba(255,255,255,.3)}

/* ─── PROGRESS ROW ──────────────────────────────────────────────────────── */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--text);border-radius:3px;transition:width .4s}
.prog-lbl{font-size:12px;color:var(--text2);white-space:nowrap}

/* ─── TASKS ─────────────────────────────────────────────────────────────── */
/* Regular task row — click checkbox to toggle, click text area to edit */
.task-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:5px;transition:background .1s,box-shadow .1s;box-shadow:var(--shadow)}
.task-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.task-item.done{opacity:.7}
.task-item.done .task-txt{text-decoration:line-through;color:var(--text3)}
.task-item.editing{border-color:var(--text);box-shadow:0 0 0 3px rgba(26,23,20,.08)}
/* Overdue tasks get a red left border */
.task-item.overdue{border-left:3px solid var(--red)}

.cb{width:18px;height:18px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;cursor:pointer}
.cb:hover{border-color:var(--text)}
.cb.checked{background:var(--text);border-color:var(--text)}

.task-body{flex:1;min-width:0}
/* Static display of task text */
.task-txt{font-size:13px;line-height:1.5;color:var(--text);cursor:text;word-break:break-word}
/* Inline edit input — shown when editing */
.task-edit-inp{width:100%;font-size:13px;background:transparent;border:none;outline:none;color:var(--text);line-height:1.5;padding:0}
.task-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;align-items:center}
.task-due-label{font-size:10px;padding:1px 6px;border-radius:8px}
.due-overdue{background:var(--red-bg);color:var(--red-tc)}
.due-today{background:var(--amber-bg);color:var(--amber-tc)}
.due-tomorrow{background:var(--green-bg);color:var(--green-tc)}
.due-soon{background:var(--surface2);color:var(--text2)}

.task-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-top:1px}
.task-action-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;border-radius:4px;font-size:13px;line-height:1;opacity:0;transition:opacity .1s,background .1s}
.task-item:hover .task-action-btn{opacity:1}
.task-action-btn:hover{background:var(--surface2);color:var(--text)}
/* On mobile, always show action buttons */
@media(max-width:640px){.task-action-btn{opacity:1}}

/* Drag handle */
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;padding:2px 3px;opacity:0;transition:opacity .1s}
.task-item:hover .drag-handle{opacity:1}
.task-item.dragging{opacity:.4;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.task-item.drag-over{border-top:2px solid var(--text)}
@media(max-width:640px){.drag-handle{opacity:1}}

.pill{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;display:inline-block}

/* ─── ADD TASK ROW ──────────────────────────────────────────────────────── */
.add-task-wrap{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radm);padding:10px 12px;margin-top:8px;transition:border-color .15s}
.add-task-wrap:focus-within{border-color:var(--text);border-style:solid}
.add-task-top{display:flex;align-items:center;gap:8px}
.add-task-inp{flex:1;font-size:13px;background:transparent;border:none;outline:none;color:var(--text)}
.add-task-inp::placeholder{color:var(--text3)}
.add-task-meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-task-meta select{font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rads);background:var(--surface);color:var(--text);outline:none;cursor:pointer}
.add-task-submit{padding:6px 14px;font-size:12px;font-weight:600;background:var(--text);color:#fff;border:none;border-radius:var(--rads);cursor:pointer;flex-shrink:0}
.add-task-submit:hover{opacity:.85}

/* ─── BUTTONS ───────────────────────────────────────────────────────────── */
.btn{padding:8px 15px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radm);cursor:pointer;background:transparent;color:var(--text);transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);font-weight:500}
.btn-primary:hover{opacity:.85;background:var(--text)}
.btn-full{width:100%;padding:11px;font-size:14px}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:20px;border:1px solid var(--border2)}
.btn-sm.active{background:var(--text);color:#fff;border-color:var(--text)}
.btn-icon{padding:4px 9px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rads);cursor:pointer;background:transparent;color:var(--text2)}
.btn-icon:hover{background:var(--surface2)}
.btn-danger{border-color:#F7C1C1;color:var(--red);background:var(--red-bg)}

/* ─── COMMITMENTS ───────────────────────────────────────────────────────── */
.commit-item{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:6px;box-shadow:var(--shadow);transition:box-shadow .1s}
.commit-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.commit-item.done .c-what{text-decoration:line-through;color:var(--text3)}
.commit-item.editing-commit{border-color:var(--text)}
.c-left{flex:1;min-width:0}
.c-who{font-size:13px;font-weight:600;margin-bottom:2px;cursor:text}
.c-what{font-size:12px;color:var(--text2);line-height:1.5;cursor:text}
/* Inline edit fields for commitment */
.c-edit-inp{width:100%;font-size:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rads);padding:4px 8px;outline:none;margin-bottom:4px;color:var(--text)}
.c-meta{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap}
.c-actions{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.c-action-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;border-radius:4px;font-size:13px;opacity:0;transition:opacity .1s}
.commit-item:hover .c-action-btn{opacity:1}
@media(max-width:640px){.c-action-btn{opacity:1}}
.circle-btn{width:24px;height:24px;border:1.5px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;background:transparent;padding:0;transition:all .15s}
.circle-btn:hover{border-color:var(--text)}
.circle-btn.checked{background:var(--text);border-color:var(--text)}

/* ─── FORM FIELDS ───────────────────────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:420px){.form-grid{grid-template-columns:1fr}}
.field-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.field-inp{width:100%;font-size:13px;padding:9px 10px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.field-inp:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(26,23,20,.06)}
.field-ta{width:100%;font-size:13px;padding:9px 10px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none;resize:none;transition:border-color .15s}
.field-ta:focus{border-color:var(--text)}

/* ─── GOALS ─────────────────────────────────────────────────────────────── */
.goal-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:5px;box-shadow:var(--shadow)}
.goal-inp{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);cursor:text}
.goal-inp:focus{background:var(--surface2);padding:2px 6px;border-radius:4px}

/* ─── RECURRING ─────────────────────────────────────────────────────────── */
.rec-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:5px;box-shadow:var(--shadow)}
.rec-item.editing-rec{border-color:var(--text)}
.rec-txt{flex:1;font-size:13px;cursor:text}
.rec-edit-inp{flex:1;font-size:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rads);padding:4px 8px;outline:none;color:var(--text)}
.rec-freq-badge{font-size:10px;padding:2px 7px;border-radius:9px;background:var(--surface2);color:var(--text2);white-space:nowrap;flex-shrink:0;cursor:pointer}
.rec-action-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;border-radius:4px;font-size:13px;opacity:0}
.rec-item:hover .rec-action-btn{opacity:1}
@media(max-width:640px){.rec-action-btn{opacity:1}}

/* ─── SCORES ────────────────────────────────────────────────────────────── */
.score-dots{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.sdot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;transition:all .15s;flex-shrink:0;padding:0;background:transparent}
.sdot:hover{transform:scale(1.2)}

/* ─── TABS ──────────────────────────────────────────────────────────────── */
.tab-row{display:flex;gap:6px;flex-wrap:nowrap;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab-row::-webkit-scrollbar{display:none}

/* ─── ROLE DETAIL HEADER ─────────────────────────────────────────────────── */
.rdh{display:flex;align-items:flex-start;gap:12px}
.rdh-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px}
.rdh-info{flex:1;min-width:0}
.rdh-name{font-size:19px;font-weight:600}
.rdh-sub-text{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5}
.rdh-stats{display:flex;gap:14px;flex-shrink:0}
.rdhs-n{font-size:20px;font-weight:600;text-align:center}
.rdhs-l{font-size:10px;color:var(--text3);text-align:center}

/* ─── MANAGE ─────────────────────────────────────────────────────────────── */
.manage-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border-radius:var(--radm);margin-bottom:6px}
.manage-item-name{flex:1;font-size:13px;cursor:text}
.manage-edit-inp{flex:1;font-size:13px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rads);padding:4px 8px;outline:none;color:var(--text)}
.mi-status{font-size:10px;padding:2px 8px;border-radius:10px}
.status-active{background:var(--green-bg);color:var(--green-tc)}
.status-archived{background:var(--surface3);color:var(--text3)}

/* ─── REMINDERS ─────────────────────────────────────────────────────────── */
.reminder-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radm);margin-bottom:7px;box-shadow:var(--shadow)}
.ri-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.ri-content{flex:1}
.ri-title{font-size:13px;font-weight:600;margin-bottom:2px}
.ri-sub{font-size:12px;color:var(--text2);line-height:1.5}
.ri-tag{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:5px}

/* ─── CALENDAR ──────────────────────────────────────────────────────────── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-title{font-size:16px;font-weight:600}
.cal-mode-btns{display:flex;gap:6px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.day-header{text-align:center;font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;padding:4px 0}
.day-cell{border:1px solid var(--border);border-radius:var(--rads);padding:5px 3px;min-height:65px;background:var(--surface);cursor:pointer;transition:background .1s}
.day-cell:hover{background:var(--surface2)}
.day-cell.today{border-color:var(--text);border-width:2px}
.day-cell.other-month{background:var(--surface2);opacity:.6}
.day-num{font-size:11px;font-weight:600;margin-bottom:3px;text-align:center}
.day-cell.today .day-num{background:var(--text);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;font-size:10px}
.cal-event{font-size:8px;padding:2px 3px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}

// ═══════════════════════════════════════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════════════════════════════════════
function snapshot(){return JSON.parse(JSON.stringify(S))}

function pushUndo(before,msg){
  undoStack.push({state:before,msg});
  redoStack=[];
  if(undoStack.length>30)undoStack.shift();
  showUndoBar(msg);
}

function showUndoBar(msg){
  const bar=document.getElementById('undoBar');
  document.getElementById('undoMsg').textContent=msg||'Change made';
  bar.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>bar.classList.remove('show'),4000);
}

function undo(){
  if(!undoStack.length)return;
  const entry=undoStack.pop();
  redoStack.push({state:snapshot(),msg:entry.msg});
  S=entry.state;
  scheduleSave();render();
  showUndoBar('Undone: '+entry.msg);
}

function redo(){
  if(!redoStack.length)return;
  const entry=redoStack.pop();
  undoStack.push({state:snapshot(),msg:entry.msg});
  S=entry.state;
  scheduleSave();render();
  showUndoBar('Redone: '+entry.msg);
}

// Global keyboard shortcuts
document.addEventListener('keydown',e=>{
  // Ctrl+Z = undo
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return}
  // Ctrl+Y or Ctrl+Shift+Z = redo
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return}
  // Escape = cancel any inline edit
  if(e.key==='Escape'){cancelAllEdits();return}
});

function cancelAllEdits(){
  if(UI.editingTaskId||UI.editingCommitId||UI.editingRecId||UI.editingSubId){
    UI.editingTaskId=null;UI.editingCommitId=null;UI.editingRecId=null;UI.editingSubId=null;
    render();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// GOOGLE SHEETS SYNC
// ═══════════════════════════════════════════════════════════════════════════
function setSyncStatus(state,label){
  document.getElementById('syncDot').className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  document.getElementById('syncLabel').textContent=label;
}

async function sheetsRequest(method,path,body){
  const url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+path;
  const opts={method,headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url,opts);
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function loadFromSheets(){
  try{
    const res=await sheetsRequest('GET','/values/Data!A1');
    const rows=res.values;
    if(rows&&rows[0]&&rows[0][0]){
      const loaded=JSON.parse(rows[0][0]);
      // Merge: loaded data takes priority, DEFAULT fills any missing fields
      S=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),loaded);
      // Ensure new fields added in updates exist on old saved data
      if(!S.subProjects)S.subProjects=DEFAULT.subProjects;
      if(!S.calConnected)S.calConnected={gcal:false,outlook:false};
      // Add notes field to any task/commit that doesn't have it yet
      S.tasks.forEach(t=>{if(t.notes===undefined)t.notes='';if(t.dueDate===undefined)t.dueDate=''});
      S.commits.forEach(c=>{if(c.notes===undefined)c.notes=''});
    }else{
      await saveToSheets(true);
    }
  }catch(e){
    console.warn('Load failed, using defaults:',e);
    setSyncStatus('error','Load failed');
  }
}

async function saveToSheets(silent){
  if(!isAuthenticated)return;
  if(!silent)setSyncStatus('syncing','Saving...');
  try{
    await sheetsRequest('PUT','/values/Data!A1?valueInputOption=RAW',{
      range:'Data!A1',majorDimension:'ROWS',values:[[JSON.stringify(S)]]
    });
    setSyncStatus('saved','Saved');
  }catch(e){
    setSyncStatus('error','Save failed');
    console.error('Save error:',e);
  }
}

function scheduleSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>saveToSheets(false),1500);
}

function manualSync(){saveToSheets(false)}

    scope:SCOPES,
    callback:async(resp)=>{
      if(resp.error){setSyncStatus('error','Auth failed');return}
      accessToken=resp.access_token;
      isAuthenticated=true;
      localStorage.setItem('cc_hint','1');
      document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text2)">Loading your data...</div></div>';
      await loadFromSheets();
      document.getElementById('bottomNav').style.display='flex';
      updateReminderBadge();
      render();
    }

async function fetchGCalEvents(){
  if(!accessToken||!S.calConnected.gcal)return[];
  try{
    const start=new Date();start.setDate(start.getDate()-7);
    const end=new Date();end.setDate(end.getDate()+30);
    const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=50`;
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+accessToken}});
    const data=await res.json();
    return(data.items||[]).map(e=>({
      id:e.id,title:e.summary||'(no title)',
      start:e.start.dateTime||e.start.date,
      source:'gcal'
    }));
  }catch(e){return[]}
}

function connectGCal(){
  S.calConnected.gcal=true;scheduleSave();
  fetchGCalEvents().then(evts=>{gcalEvents=evts;render()});
}

// UTILITY HELPERS

function chk(c){return '<svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="'+(c||'#fff')+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4l2.5 2.5L9 1"/></svg>'}
function pill(bg,tc,text){return '<span class="pill" style="background:'+bg+';color:'+tc+'">'+esc(text)+'</span>'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getSubName(role,subId){if(!subId)return '';const s=(S.subProjects[role]||[]).find(x=>x.id===subId);return s?s.name:''}
function getActiveSubs(role){return(S.subProjects[role]||[]).filter(s=>!s.archived)}
function subPill(role,subId){if(!subId)return '';const n=getSubName(role,subId);if(!n)return '';const r=ROLES[role];return pill(r.bg,r.tc,n)}

function freqLabel(f,days){
  const map={daily:'Daily',weekdays:'Weekdays',weekly:'Weekly',biweekly:'Every 2 wks',monthly:'Monthly','last-week-month':'Last wk/mo','custom-days':'Custom','custom-date':'Custom date'};
  if(f==='custom-days'&&days&&days.length)return DAY_NAMES.filter((_,i)=>days.includes(i)).join('/');
  return map[f]||f;
}

function isDueToday(freq,days,date){
  const d=NOW.getDay(),dom=NOW.getDate();
  if(freq==='daily')return true;
  if(freq==='weekdays')return d>=1&&d<=5;
  if(freq==='weekly')return!days||!days.length||days.includes(d);
  if(freq==='custom-days')return days&&days.includes(d);
  if(freq==='monthly')return dom===1;
  if(freq==='last-week-month'){const last=new Date(NOW.getFullYear(),NOW.getMonth()+1,0).getDate();return dom>=last-6}
  if(freq==='custom-date')return dom===parseInt(date);
  return false;
}

// Human-readable due date labels: "Overdue", "Today", "Tomorrow", "In 3 days", etc.
function dueDateLabel(dateStr){
  if(!dateStr)return null;
  const due=new Date(dateStr);
  due.setHours(0,0,0,0);
  const today=new Date(NOW);today.setHours(0,0,0,0);
  const diff=Math.round((due-today)/(1000*60*60*24));
  if(diff<0)return{text:'Overdue',cls:'due-overdue'};
  if(diff===0)return{text:'Today',cls:'due-today'};
  if(diff===1)return{text:'Tomorrow',cls:'due-tomorrow'};
  if(diff<=7)return{text:'In '+diff+' days',cls:'due-soon'};
  return{text:due.toLocaleDateString('en-GB',{day:'numeric',month:'short'}),cls:'due-soon'};
}

// Highlight search term in text
function highlight(text,query){
  if(!query||!text)return esc(text);
  const escaped=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(text).replace(new RegExp('('+escaped+')','gi'),'<mark class="search-highlight">$1</mark>');
}

function renderSearch(){
  const q=UI.searchQuery.toLowerCase();
  let h='<div class="page-title">Search results</div><div class="page-sub">Showing results for "'+esc(UI.searchQuery)+'"</div>';

  const matchTasks=S.tasks.filter(t=>t.text.toLowerCase().includes(q));

  const matchGoals=[];
  ['n90','n1y','n3y'].forEach(h2=>S.goals[h2].forEach(g=>{if(g.text.toLowerCase().includes(q))matchGoals.push({...g,horizon:h2})}));

  const total=matchTasks.length+matchCommits.length+matchGoals.length;
  if(!total){

  }

  if(matchTasks.length){
    h+='<div class="search-result-section"><div class="search-result-label">Tasks ('+matchTasks.length+')</div>';
    matchTasks.forEach(t=>{
      const r=ROLES[t.area];
      h+='<div class="task-item'+(t.done?' done':'')+'"><div class="cb'+(t.done?' checked':'')+'" onclick="toggleTask('+t.id+')">'+(t.done?chk():'')+'</div>';

      h+=pill(r.bg,r.tc,r.short)+'</div>';
    });
    h+='</div>';
  }
  if(matchCommits.length){
    h+='<div class="search-result-section"><div class="search-result-label">Commitments ('+matchCommits.length+')</div>';
    matchCommits.forEach(c=>{
      const r=ROLES[c.role];
      h+='<div class="commit-item'+(c.done?' done':'')+'"><div class="c-left">';
      h+=pill(r.bg,r.tc,r.label);
      h+='<div class="c-who" style="margin-top:4px">'+highlight(c.who,UI.searchQuery)+'</div>';
      h+='<div class="c-what">'+highlight(c.what,UI.searchQuery)+'</div></div>';
      h+='<button class="circle-btn'+(c.done?' checked':'')+'" onclick="toggleCommit('+c.id+')">'+(c.done?chk():'')+'</button></div>';
    });
    h+='</div>';
  }
  if(matchGoals.length){
    h+='<div class="search-result-section"><div class="search-result-label">Goals ('+matchGoals.length+')</div>';
    matchGoals.forEach(g=>{
      const r=ROLES[g.area];
      h+='<div class="goal-row">'+pill(r.bg,r.tc,r.short);
      h+='<span style="font-size:13px;margin-left:6px">'+highlight(g.text,UI.searchQuery)+'</span></div>';
    });
    h+='</div>';
  }
  return h;
}

function getReminders(){
  const items=[];
  items.push({type:'checkin',title:'Morning check-in',sub:'Open Today and set your one non-negotiable.',icon:'&#9788;',bg:'#FBF0E0',tc:'#633806',tag:'Daily'});
  const gofUrgent=S.commits.filter(c=>c.role==='gof'&&!c.done&&c.urg==='u');
  if(gofUrgent.length)items.push({type:'gof',title:'GOF Ethiopia — '+gofUrgent.length+' urgent item'+(gofUrgent.length>1?'s':''),sub:gofUrgent.map(c=>c.what).join(' · '),icon:'!',bg:ROLES.gof.bg,tc:ROLES.gof.tc,tag:'Urgent'});
  const healthUrgent=S.commits.filter(c=>c.role==='health'&&!c.done&&c.urg==='u');
  if(healthUrgent.length)items.push({type:'health',title:'Health — action needed',sub:healthUrgent.map(c=>c.what).join(' · '),icon:'&#9829;',bg:ROLES.health.bg,tc:ROLES.health.tc,tag:'Urgent'});
  const overdue=S.commits.filter(c=>!c.done&&c.urg==='u'&&c.role!=='gof'&&c.role!=='health');
  overdue.slice(0,3).forEach(c=>{
    const r=ROLES[c.role];
    items.push({type:'overdue',title:c.who+' — '+c.what,sub:'Urgent · '+r.label+(c.sub?' · '+getSubName(c.role,c.sub):''),icon:'!',bg:r.bg,tc:r.tc,tag:'Overdue'});
  });
  const thisWeek=S.commits.filter(c=>!c.done&&c.urg==='s');
  if(thisWeek.length)items.push({type:'week',title:thisWeek.length+' commitment'+(thisWeek.length>1?'s':'')+' due this week',sub:thisWeek.slice(0,3).map(c=>c.what).join(' · '),icon:'&#9711;',bg:'#FAEEDA',tc:'#633806',tag:'This week'});
  const recToday=[];
  Object.entries(S.recurring).forEach(([role,recs])=>{
    (recs||[]).forEach(r=>{if(isDueToday(r.freq,r.days,r.date))recToday.push({...r,role})});
  });
  if(recToday.length)items.push({type:'recurring',title:recToday.length+' recurring task'+(recToday.length>1?'s':'')+' due today',sub:recToday.slice(0,4).map(r=>r.text).join(' · '),icon:'&#8635;',bg:'#EEF0FC',tc:'#3C3489',tag:'Recurring'});
  return items;
}

  subs.forEach(s=>{sub.innerHTML+='<option value="'+s.id+'">'+esc(s.name)+'</option>'});
}

function handleAddTaskKey(e){
  if(e.key==='Enter'){e.preventDefault();addTask()}
  if(e.key==='Escape'){
    document.getElementById('nti').blur();
    document.getElementById('addTaskMeta').style.display='none';
    document.getElementById('addTaskHint').style.display='none';
    document.getElementById('addTaskBtn').style.display='none';
  }
}

function addTask(){
  const inp=document.getElementById('nti');
  if(!inp||!inp.value.trim())return;
  const area=document.getElementById('nta')?document.getElementById('nta').value:'oaf';
  const sub=document.getElementById('nts')?document.getElementById('nts').value:'';
  const freq=document.getElementById('ntf')?document.getElementById('ntf').value:'daily';
  const dueDate=document.getElementById('ntd')?document.getElementById('ntd').value:'';
  const b=snapshot();
  S.tasks.push({id:S.nextId++,text:inp.value.trim(),area,sub,done:false,freq,days:[],date:'',dueDate,notes:''});
  inp.value='';
  pushUndo(b,'Added task');scheduleSave();render();
  // Re-focus the input after adding
  setTimeout(()=>{const el=document.getElementById('nti');if(el)el.focus()},30);
}

// Start inline editing a task
function startEditTask(id){
  if(UI.editingTaskId===id)return; // already editing
  UI.editingTaskId=id;
  render();
}

// Save the edited text when user presses Enter or clicks away
function saveTaskEdit(id){
  const inp=document.getElementById('task-edit-'+id);
  if(!inp)return;
  const newText=inp.value.trim();
  if(newText&&newText!==S.tasks.find(t=>t.id===id)?.text){
    const b=snapshot();
    const t=S.tasks.find(x=>x.id===id);
    if(t)t.text=newText;
    pushUndo(b,'Edited task');scheduleSave();
  }
  UI.editingTaskId=null;
  render();
}

function handleTaskEditKey(e,id){
  if(e.key==='Enter'){e.preventDefault();saveTaskEdit(id)}
  if(e.key==='Escape'){e.preventDefault();UI.editingTaskId=null;render()}
}

// Update a single field on a task (area, sub, dueDate)
function updateTaskField(id,field,value){
  const b=snapshot();
  const t=S.tasks.find(x=>x.id===id);
  if(t){
    t[field]=value;
    // If area changed, clear sub since it won't be valid
    if(field==='area')t.sub='';
    pushUndo(b,'Updated task '+field);scheduleSave();
    // Re-render just to refresh sub dropdown options if area changed
    if(field==='area')render();
  }
}

function toggleTask(id){
  const b=snapshot();
  const t=S.tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;if(t.done)UI.editingTaskId=null;pushUndo(b,t.done?'Task completed':'Task unchecked');scheduleSave();render()}
}

function confirmDeleteTask(e,id){
  e.stopPropagation();
  const t=S.tasks.find(x=>x.id===id);
  confirmDelete('Delete this task?','"'+((t&&t.text)||'')+'"\n\nThis can be undone with Ctrl+Z.',()=>{
    const b=snapshot();
    S.tasks=S.tasks.filter(x=>x.id!==id);
    UI.editingTaskId=null;
    pushUndo(b,'Deleted task: '+(t?t.text:''));scheduleSave();render();
  });
}

// ═══════════════════════════════════════════════════════════════════════════
function bindDragDrop(){
  // Touch-based drag is handled via the DOM events set in renderTaskRow
}

function dragStart(e,id){
  UI.draggingTaskId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{
    const el=document.getElementById('task-'+id);
    if(el)el.classList.add('dragging');
  },0);
}

function dragOver(e,id){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  if(UI.dragOverTaskId!==id){
    // Remove previous drag-over highlight
    if(UI.dragOverTaskId){
      const prev=document.getElementById('task-'+UI.dragOverTaskId);
      if(prev)prev.classList.remove('drag-over');
    }
    UI.dragOverTaskId=id;
    const el=document.getElementById('task-'+id);
    if(el)el.classList.add('drag-over');
  }
}

function drop(e,targetId){
  e.preventDefault();
  if(UI.draggingTaskId===null||UI.draggingTaskId===targetId)return;
  const b=snapshot();
  const fromIdx=S.tasks.findIndex(t=>t.id===UI.draggingTaskId);
  const toIdx=S.tasks.findIndex(t=>t.id===targetId);
  if(fromIdx===-1||toIdx===-1)return;
  const [moved]=S.tasks.splice(fromIdx,1);
  S.tasks.splice(toIdx,0,moved);
  pushUndo(b,'Reordered tasks');scheduleSave();render();
}

function dragEnd(){
  UI.draggingTaskId=null;UI.dragOverTaskId=null;
}

function setCalMode(m){UI.calMode=m;render()}
function calNav(dir){
  const d=new Date(UI.calDate);
  if(UI.calMode==='week')d.setDate(d.getDate()+dir*7);
  else d.setMonth(d.getMonth()+dir);
  UI.calDate=d;render();
}

function getEventsForDate(date){
  const ds=date.toISOString().split('T')[0];
  const events=[];
  S.tasks.forEach(t=>{
    if(isDueOnDate(t.freq,t.days,t.date,t.dueDate,date))events.push({title:t.text,role:t.area});
  });
  S.commits.forEach(c=>{if(c.dueDate===ds&&!c.done)events.push({title:c.what,role:c.role})});
  gcalEvents.forEach(e=>{if(e.start&&e.start.split('T')[0]===ds)events.push({title:e.title,role:null})});
  return events;
}

function isDueOnDate(freq,days,recDate,dueDate,d){
  // Check specific due date first
  if(dueDate&&dueDate===d.toISOString().split('T')[0])return true;
  const dow=d.getDay(),dom=d.getDate();
  if(freq==='daily')return true;
  if(freq==='weekdays')return dow>=1&&dow<=5;
  if(freq==='weekly')return!days||!days.length||days.includes(dow);
  if(freq==='custom-days')return days&&days.includes(dow);
  if(freq==='monthly')return dom===1;
  if(freq==='last-week-month'){const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();return dom>=last-6}
  if(freq==='custom-date')return dom===parseInt(recDate);
  return false;
}

function renderWeekCal(){
  const start=new Date(UI.calDate);
  start.setDate(start.getDate()-start.getDay());
  const end=new Date(start);end.setDate(end.getDate()+6);
  setTimeout(()=>{const t=document.getElementById('calTitle');if(t)t.textContent=start.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+end.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})},0);
  let h='<div class="week-grid">';
  DAY_NAMES.forEach(d=>{h+='<div class="day-header">'+d+'</div>'});
  for(let i=0;i<7;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    const isToday=d.toDateString()===NOW.toDateString();
    const events=getEventsForDate(d);
    h+='<div class="day-cell'+(isToday?' today':'')+'">';
    h+='<div class="day-num">'+d.getDate()+'</div>';
    events.slice(0,3).forEach(e=>{
      const r=e.role?ROLES[e.role]:null;
      h+='<div class="cal-event" style="background:'+(r?r.bg:'#EBF2FC')+';color:'+(r?r.tc:'#0C447C')+'">'+esc(e.title)+'</div>';
    });
    if(events.length>3)h+='<div style="font-size:8px;color:var(--text3)">+'+( events.length-3)+' more</div>';
    h+='</div>';
  }
  return h+'</div>';
}

function renderMonthCal(){
  const y=UI.calDate.getFullYear(),m=UI.calDate.getMonth();
  setTimeout(()=>{const t=document.getElementById('calTitle');if(t)t.textContent=MONTH_NAMES[m]+' '+y},0);
  const first=new Date(y,m,1);const last=new Date(y,m+1,0);
  let h='<div class="month-grid">';
  DAY_NAMES.forEach(d=>{h+='<div class="day-header">'+d+'</div>'});
  for(let i=0;i<first.getDay();i++)h+='<div class="day-cell other-month"></div>';
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d);
    const isToday=date.toDateString()===NOW.toDateString();
    const events=getEventsForDate(date);
    h+='<div class="day-cell'+(isToday?' today':'')+'" style="min-height:50px">';
    h+='<div class="day-num">'+d+'</div>';
    events.slice(0,2).forEach(e=>{
      const r=e.role?ROLES[e.role]:null;
      h+='<div class="cal-event" style="background:'+(r?r.bg:'#EBF2FC')+';color:'+(r?r.tc:'#0C447C')+'">'+esc(e.title)+'</div>';
    });
    if(events.length>2)h+='<div style="font-size:8px;color:var(--text3)">+'+( events.length-2)+'</div>';
    h+='</div>';
  }
  return h+'</div>';
}

function editGoal(h,i,v){const t=S.goals[h][i];if(t&&v.trim()!==t.text){const b=snapshot();t.text=v.trim();pushUndo(b,'Edited goal');scheduleSave()}}

function saveCommitEdit(id){

  getActiveSubs(rid).forEach(s=>{h+='<option value="'+s.id+'"'+(s.id===subKey?' selected':'')+'>'+esc(s.name)+'</option>'});
  h+='</select></div><div><div class="field-lbl">Urgency</div><select class="field-inp" id="cf-urg"><option value="u">Urgent</option><option value="s">This week</option><option value="o">This month</option></select></div></div>';
  h+='<div style="margin-bottom:10px"><div class="field-lbl">What did you commit to?</div><input class="field-inp" id="cf-what" type="text" placeholder="Be specific..." onkeydown="if(event.key===\'Enter\')addCommitment()"></div>';
  h+='<div class="form-grid"><div><div class="field-lbl">Recurring?</div><select class="field-inp" id="cf-freq"><option value="">One-time</option>';
  FREQ_OPTIONS.forEach(f=>{h+='<option value="'+f.v+'">'+f.l+'</option>'});
  h+='</select></div><div><div class="field-lbl">Due date (optional)</div><input class="field-inp" id="cf-due" type="date"></div></div>';
  h+='<button class="btn btn-primary btn-full" style="margin-top:10px" onclick="addCommitment()">Save commitment</button></div>';
  return h;
}

function bindCommitForm(){/* called after commitments page renders - placeholder */}
function refreshCommitSubSel(){
  const role=document.getElementById('cf-role').value;
  const sub=document.getElementById('cf-sub');
  if(!sub)return;
  const subs=getActiveSubs(role);
  sub.innerHTML='<option value="">None</option>';
  subs.forEach(s=>{sub.innerHTML+='<option value="'+s.id+'">'+esc(s.name)+'</option>'});
}

function toggleCommit(id){
  const b=snapshot();const c=S.commits.find(x=>x.id===id);
  if(c){c.done=!c.done;if(c.done)UI.editingCommitId=null;pushUndo(b,c.done?'Commitment done':'Commitment undone');scheduleSave();render()}
}

function confirmDeleteCommit(id){
  const c=S.commits.find(x=>x.id===id);
  confirmDelete('Delete this commitment?',c?'"'+c.what+'"':null,()=>{
    const b=snapshot();S.commits=S.commits.filter(x=>x.id!==id);UI.editingCommitId=null;
    pushUndo(b,'Deleted commitment: '+(c?c.what:''));scheduleSave();render();
  });
}

function addCommitment(){
  const who=document.getElementById('cf-who');const what=document.getElementById('cf-what');
  const role=document.getElementById('cf-role');const sub=document.getElementById('cf-sub');
  const urg=document.getElementById('cf-urg');const freq=document.getElementById('cf-freq');
  const due=document.getElementById('cf-due');
  if(!who||!what||!who.value.trim()||!what.value.trim())return;
  const b=snapshot();
  S.commits.push({id:S.nextId++,who:who.value.trim(),what:what.value.trim(),role:role.value,sub:sub?sub.value:'',urg:urg.value,freq:freq.value,dueDate:due?due.value:'',done:false,notes:''});
  who.value='';what.value='';
  pushUndo(b,'Added commitment');scheduleSave();render();
}

// ═══════════════════════════════════════════════════════════════════════════
// ROLES MENU
// ═══════════════════════════════════════════════════════════════════════════
function renderRolesMenu(){
  let h='<div class="page-title">My Roles</div><div class="page-sub">Tap a role to see everything inside it</div>';
  Object.entries(ROLES).forEach(([key,r])=>{
    const subs=getActiveSubs(key);
    const pendingCommits=S.commits.filter(c=>c.role===key&&!c.done).length;
    h+='<button class="role-card" onclick="openRole(\''+key+'\')">';
    h+='<div class="rch"><div class="rch-dot" style="background:'+r.dot+'"></div><div class="rch-name">'+r.label+'</div>';
    if(r.alert)h+='<span class="rch-badge" style="background:'+(r.alert==='red'?'#FCEBEB':'#FAEEDA')+';color:'+(r.alert==='red'?'#791F1F':'#633806')+'">'+(r.alert==='red'?'Urgent':'Watch')+'</span>';
    if(pendingCommits)h+='<span style="margin-left:auto;font-size:11px;color:var(--text2)">'+pendingCommits+' open</span>';
    h+='</div>';
    if(subs.length){h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">';subs.forEach(s=>{h+=pill(r.bg,r.tc,s.name)});h+='</div>'}
    h+='<div style="font-size:12px;color:var(--text2)">'+r.sub+'</div></button>';
  });
  return h;
}

// ═══════════════════════════════════════════════════════════════════════════
// ROLE DETAIL VIEW
// ═══════════════════════════════════════════════════════════════════════════
function renderRoleDetail(){
  const key=UI.roleView;const r=ROLES[key];
  const allSubs=S.subProjects[key]||[];
  const activeSubs=allSubs.filter(s=>!s.archived);
  const mc=S.commits.filter(c=>c.role===key);
  const myRec=S.recurring[key]||[];
  const myTasks=S.tasks.filter(t=>t.area===key);
  const sc=S.scores[key];
  let h='<button class="btn" style="margin-bottom:13px" onclick="backFromRole()">&#8592; Back</button>';

  // Header card
  h+='<div class="card" style="margin-bottom:13px"><div class="rdh"><div class="rdh-dot" style="background:'+r.dot+'"></div>';
  h+='<div class="rdh-info"><div class="rdh-name">'+r.label+'</div><div class="rdh-sub-text">'+r.sub+'</div>';
  if(activeSubs.length){h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">';activeSubs.forEach(s=>{h+=pill(r.bg,r.tc,s.name)});h+='</div>'}
  h+='</div><div class="rdh-stats">';
  [{n:mc.filter(c=>!c.done).length,l:'open'},{n:mc.filter(c=>c.done).length,l:'done'},{n:myRec.length,l:'recurring'}].forEach(s=>{
    h+='<div><div class="rdhs-n">'+s.n+'</div><div class="rdhs-l">'+s.l+'</div></div>';
  });
  h+='</div></div></div>';

  // Vision + score card
  h+='<div class="card" style="margin-bottom:13px">';
  h+='<div class="sec-lbl">Vision for this role</div>';
  h+='<textarea class="field-ta" id="visionTA" rows="3" placeholder="What does thriving look like here?">'+esc(S.vision[key])+'</textarea>';
  h+='<div class="sec-lbl" style="margin-top:11px">Satisfaction: '+sc+'/10</div><div class="score-dots">';
  for(let i=0;i<10;i++){h+='<button class="sdot" style="background:'+(i<sc?r.dot:'transparent')+';border-color:'+(i<sc?r.dot:'var(--border2)')+'" onclick="setScore(\''+key+'\','+(i+1)+')"></button>'}
  h+='</div></div>';

  // Tab bar
  const tabs=[
    {t:'commits',l:'Commits ('+mc.filter(c=>!c.done).length+' open)'},
    {t:'recurring',l:'Recurring ('+myRec.length+')'},
    {t:'today',l:'Tasks ('+myTasks.length+')'},
    {t:'add',l:'+ Add'},
    {t:'manage',l:'Manage'}
  ];
  h+='<div class="tab-row">';
  tabs.forEach(tb=>{h+='<button class="btn btn-sm'+(UI.roleTab===tb.t?' active':'')+'" onclick="setRoleTab(\''+tb.t+'\')">'+tb.l+'</button>'});
  h+='</div>';

  // Sub-filter chips (only for roles that have sub-labels)
  if(activeSubs.length&&['commits','today','recurring'].includes(UI.roleTab)){
    h+='<div class="tab-row">';
    h+='<button class="btn btn-sm'+(UI.subFilter==='all'?' active':'')+'" onclick="setSubFilter(\'all\')">All</button>';
    activeSubs.forEach(s=>{h+='<button class="btn btn-sm'+(UI.subFilter===s.id?' active':'')+'" onclick="setSubFilter(\''+s.id+'\')">'+esc(s.name)+'</button>'});
    h+='</div>';
  }

  // ── COMMITS TAB ──
  if(UI.roleTab==='commits'){
    const filtered=mc.filter(c=>UI.subFilter==='all'||c.sub===UI.subFilter);
    if(!filtered.length){
      h+='<div class="empty-state"><div class="empty-state-icon">&#10003;</div>No commitments yet<div class="empty-state-action">Use the + Add tab to log a promise you\'ve made</div></div>';
    }else{
      filtered.forEach(c=>{h+=renderCommitCard(c,true)});
    }
  }

  // ── RECURRING TAB ──
  if(UI.roleTab==='recurring'){
    const recs=myRec.filter(rec=>UI.subFilter==='all'||rec.sub===UI.subFilter);
    if(!recs.length){
      h+='<div class="empty-state"><div class="empty-state-icon">&#8635;</div>No recurring tasks yet<div class="empty-state-action">Add tasks that repeat on a schedule</div></div>';
    }else{
      ['daily','weekdays','weekly','biweekly','monthly','last-week-month','custom-days','custom-date'].forEach(f=>{
        const items=recs.filter(x=>x.freq===f);
        if(!items.length)return;
        const fl=FREQ_OPTIONS.find(o=>o.v===f);
        h+='<div class="sec-lbl">'+(fl?fl.l:f)+'</div>';
        items.forEach(rec=>{
          const isEditingRec=UI.editingRecId===rec.id;
          h+='<div class="rec-item'+(isEditingRec?' editing-rec':'')+'">'+pill('#F0EDE8','#6B6560',freqLabel(rec.freq,rec.days));
          if(rec.sub)h+=subPill(key,rec.sub);
          if(isEditingRec){
            h+='<input class="rec-edit-inp" id="rec-edit-'+rec.id+'" value="'+esc(rec.text)+'" onkeydown="handleRecEditKey(event,\''+key+'\',\''+rec.id+'\')" onblur="saveRecEdit(\''+key+'\',\''+rec.id+'\')">';
          }else{
            h+='<span class="rec-txt" onclick="UI.editingRecId=\''+rec.id+'\';render()" title="Click to edit">'+esc(rec.text)+'</span>';
          }
          h+='<button class="rec-action-btn" onclick="UI.editingRecId=\''+rec.id+'\';render()" title="Edit">&#9998;</button>';
          h+='<button class="rec-action-btn" onclick="confirmDeleteRec(\''+key+'\',\''+rec.id+'\')" title="Delete">&#x2715;</button>';
          h+='</div>';
        });
      });
    }
    // Add recurring task row
    h+='<div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap"><input type="text" id="recInp" placeholder="Add recurring task..." style="flex:2;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none" onkeydown="if(event.key===\'Enter\')addRec(\''+key+'\')">';
    h+='<select id="recFreq" style="font-size:12px;padding:8px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none">';
    FREQ_OPTIONS.forEach(f=>{h+='<option value="'+f.v+'">'+f.l+'</option>'});
    h+='</select></div>';
    if(activeSubs.length){
      h+='<div style="display:flex;gap:6px;margin-top:6px"><select id="recSub" style="flex:1;font-size:12px;padding:8px;border:1px solid var(--border2);border-radius:var(--radm);background:var(--surface);color:var(--text);outline:none"><option value="">No sub-label</option>';
      activeSubs.forEach(s=>{h+='<option value="'+s.id+'">'+esc(s.name)+'</option>'});
      h+='</select><button class="btn btn-primary" onclick="addRec(\''+key+'\')">+ Add</button></div>';
    }else{
      h+='<button class="btn btn-primary" style="margin-top:6px" onclick="addRec(\''+key+'\')">+ Add</button>';
    }
  }

  // ── TODAY'S TASKS TAB ──
  if(UI.roleTab==='today'){
    const filtered=myTasks.filter(t=>UI.subFilter==='all'||t.sub===UI.subFilter);
    if(!filtered.length){
      h+='<div class="empty-state"><div class="empty-state-icon">&#9711;</div>No tasks for this role today</div>';
    }else{
      filtered.forEach(t=>{h+=renderTaskRow(t)});
    }
  }

  // ── ADD TAB ──
  if(UI.roleTab==='add'){
    h+='<div class="card">';
    h+='<div class="form-grid"><div><div class="field-lbl">Type</div><select class="field-inp" id="daType"><option value="commit">Commitment (promise made)</option><option value="task">One-off task (today)</option><option value="rec">Recurring task</option></select></div>';
    h+='<div><div class="field-lbl">To whom?</div><input class="field-inp" id="daWho" type="text" placeholder="Name or group"></div></div>';
    h+='<div style="margin-bottom:10px"><div class="field-lbl">Description</div><input class="field-inp" id="daWhat" type="text" placeholder="Be specific..." onkeydown="if(event.key===\'Enter\')addFromDetail(\''+key+'\')"></div>';
    if(activeSubs.length){
      h+='<div style="margin-bottom:10px"><div class="field-lbl">Project / Client</div><select class="field-inp" id="daSub"><option value="">None</option>';
      activeSubs.forEach(s=>{h+='<option value="'+s.id+'">'+esc(s.name)+'</option>'});
      h+='</select></div>';
    }
    h+='<div class="form-grid"><div><div class="field-lbl">Urgency</div><select class="field-inp" id="daUrg"><option value="u">Urgent</option><option value="s">This week</option><option value="o">This month</option></select></div>';
    h+='<div><div class="field-lbl">Due date (optional)</div><input class="field-inp" id="daDue" type="date"></div></div>';
    h+='<div style="margin-bottom:10px"><div class="field-lbl">Frequency</div><select class="field-inp" id="daFreq"><option value="">One-time</option>';
    FREQ_OPTIONS.forEach(f=>{h+='<option value="'+f.v+'">'+f.l+'</option>'});
    h+='</select></div>';
    h+='<button class="btn btn-primary btn-full" onclick="addFromDetail(\''+key+'\')">Save</button>';
    h+='<div class="kbd-hint" style="margin-top:8px"><kbd>Enter</kbd> in description field to save quickly</div>';
    h+='</div>';
  }

  // ── MANAGE TAB ──
  if(UI.roleTab==='manage'){h+=renderManagePanel(key)}
  return h;
}

function bindRoleDetail(){
  const ta=document.getElementById('visionTA');const key=UI.roleView;
  if(ta)ta.addEventListener('input',e=>{S.vision[key]=e.target.value;scheduleSave()});
  // Auto-focus recurring edit input
  if(UI.editingRecId){
    setTimeout(()=>{const el=document.getElementById('rec-edit-'+UI.editingRecId);if(el){el.focus();el.select()}},30);
  }
  // Auto-focus commit edit
  if(UI.editingCommitId){
    setTimeout(()=>{const el=document.getElementById('c-edit-what-'+UI.editingCommitId);if(el){el.focus();el.select()}},30);
  }
}

// ── Recurring edit helpers
function handleRecEditKey(e,key,id){
  if(e.key==='Enter'){e.preventDefault();saveRecEdit(key,id)}
  if(e.key==='Escape'){e.preventDefault();UI.editingRecId=null;render()}
}
function saveRecEdit(key,id){
  const inp=document.getElementById('rec-edit-'+id);if(!inp)return;
  const newText=inp.value.trim();
  if(newText){
    const b=snapshot();const rec=(S.recurring[key]||[]).find(r=>r.id===id);
    if(rec&&newText!==rec.text){rec.text=newText;pushUndo(b,'Edited recurring task');scheduleSave()}
  }
  UI.editingRecId=null;render();
}
function confirmDeleteRec(key,id){
  const rec=(S.recurring[key]||[]).find(r=>r.id===id);
  confirmDelete('Delete this recurring task?',rec?'"'+rec.text+'"':null,()=>{
    const b=snapshot();S.recurring[key]=(S.recurring[key]||[]).filter(r=>r.id!==id);
    pushUndo(b,'Deleted recurring: '+(rec?rec.text:''));scheduleSave();render();
  });
}
function addRec(key){
  const inp=document.getElementById('recInp');const freq=document.getElementById('recFreq').value;
  const subEl=document.getElementById('recSub');const sub=subEl?subEl.value:'';
  if(!inp||!inp.value.trim())return;
  const b=snapshot();
  if(!S.recurring[key])S.recurring[key]=[];
  S.recurring[key].push({id:'r'+S.nextId++,text:inp.value.trim(),freq,days:[],date:'',sub});
  inp.value='';pushUndo(b,'Added recurring task');scheduleSave();render();
}

// ── Add from detail tab
function addFromDetail(key){
  const type=document.getElementById('daType').value;
  const what=document.getElementById('daWhat').value.trim();if(!what)return;
  const who=document.getElementById('daWho')?document.getElementById('daWho').value.trim():'';
  const urg=document.getElementById('daUrg')?document.getElementById('daUrg').value:'u';
  const freq=document.getElementById('daFreq')?document.getElementById('daFreq').value:'';
  const due=document.getElementById('daDue')?document.getElementById('daDue').value:'';
  const subEl=document.getElementById('daSub');const sub=subEl?subEl.value:'';
  const b=snapshot();
  if(type==='commit'){
    S.commits.push({id:S.nextId++,who:who||'—',what,role:key,sub,urg,freq,dueDate:due,done:false,notes:''});
    UI.roleTab='commits';
  }else if(type==='task'){
    S.tasks.push({id:S.nextId++,text:what,area:key,sub,done:false,freq:freq||'daily',days:[],date:'',dueDate:due,notes:''});
    UI.roleTab='today';
  }else{
    if(!S.recurring[key])S.recurring[key]=[];
    S.recurring[key].push({id:'r'+S.nextId++,text:what,freq:freq||'weekly',days:[],date:'',sub});
    UI.roleTab='recurring';
  }
  pushUndo(b,'Added '+type);scheduleSave();render();
}

// ── MANAGE PANEL (sub-label management with rename)
function renderManagePanel(key){
  const r=ROLES[key];
  const allSubs=S.subProjects[key]||[];
  const label=key==='oaf'?'Project':key==='lm'?'Client':'Label';
  let h='<div class="card"><div class="sec-lbl">Active '+label+'s</div>';
  const active=allSubs.filter(s=>!s.archived);
  if(!active.length){
    h+='<div class="empty-state" style="padding:12px 0"><div class="empty-state-icon">&#43;</div>No active '+label.toLowerCase()+'s yet</div>';
  }else{
    active.forEach(s=>{
      const isRenamingThis=UI.editingSubId===s.id;
      h+='<div class="manage-item">';
      if(isRenamingThis){
        h+='<input class="manage-edit-inp" id="sub-edit-'+s.id+'" value="'+esc(s.name)+'" onkeydown="handleSubEditKey(event,\''+key+'\',\''+s.id+'\')" onblur="saveSubEdit(\''+key+'\',\''+s.id+'\')">';
        h+='<button class="btn-icon" onclick="saveSubEdit(\''+key+'\',\''+s.id+'\')">Save</button>';
      }else{
        h+='<div class="manage-item-name" onclick="UI.editingSubId=\''+s.id+'\';render()" title="Click to rename">'+esc(s.name)+'</div>';
        h+='<span class="mi-status status-active">Active</span>';
        h+='<button class="btn-icon" onclick="UI.editingSubId=\''+s.id+'\';render()" title="Rename">&#9998;</button>';
        h+='<button class="btn-icon" onclick="confirmArchiveSub(\''+key+'\',\''+s.id+'\')">Archive</button>';
      }
      h+='</div>';
    });
  }
  const archived=allSubs.filter(s=>s.archived);
  if(archived.length){
    h+='<div class="sec-lbl" style="margin-top:14px">Archived</div>';
    archived.forEach(s=>{
      h+='<div class="manage-item"><div class="manage-item-name" style="color:var(--text3)">'+esc(s.name)+'</div>';
      h+='<span class="mi-status status-archived">Archived</span>';
      h+='<button class="btn-icon" onclick="restoreSub(\''+key+'\',\''+s.id+'\')">Restore</button></div>';
    });
  }
  h+='<div style="margin-top:14px"><div class="field-lbl">Add new '+label.toLowerCase()+'</div>';
  h+='<div style="display:flex;gap:6px"><input type="text" id="newSubInp" class="field-inp" style="flex:1" placeholder="'+label+' name..." onkeydown="if(event.key===\'Enter\')addSub(\''+key+'\')">';
  h+='<button class="btn btn-primary" onclick="addSub(\''+key+'\')">+ Add</button></div></div></div>';
  return h;
}

function handleSubEditKey(e,key,id){
  if(e.key==='Enter'){e.preventDefault();saveSubEdit(key,id)}
  if(e.key==='Escape'){e.preventDefault();UI.editingSubId=null;render()}
}
function saveSubEdit(key,id){
  const inp=document.getElementById('sub-edit-'+id);if(!inp)return;
  const newName=inp.value.trim();
  if(newName){
    const b=snapshot();const s=(S.subProjects[key]||[]).find(x=>x.id===id);
    if(s&&newName!==s.name){s.name=newName;pushUndo(b,'Renamed '+newName);scheduleSave()}
  }
  UI.editingSubId=null;render();
}
function addSub(key){
  const inp=document.getElementById('newSubInp');if(!inp||!inp.value.trim())return;
  const b=snapshot();
  if(!S.subProjects[key])S.subProjects[key]=[];
  S.subProjects[key].push({id:key+'-'+S.nextId++,name:inp.value.trim(),archived:false});
  inp.value='';pushUndo(b,'Added label');scheduleSave();render();
}
function confirmArchiveSub(key,id){
  const s=(S.subProjects[key]||[]).find(x=>x.id===id);
  confirmDelete('Archive "'+((s&&s.name)||'')+'?','Archived items are hidden but their tasks and commitments are kept. You can restore it anytime.',()=>{
    const b=snapshot();if(s){s.archived=true;pushUndo(b,'Archived: '+s.name);scheduleSave();render()}
  });
}
function restoreSub(key,id){
  const b=snapshot();const s=(S.subProjects[key]||[]).find(x=>x.id===id);
  if(s){s.archived=false;pushUndo(b,'Restored: '+s.name);scheduleSave();render()}
}
